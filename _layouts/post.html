<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description | escape }}"
    />
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/services/' | relative_url }}">Services</a>
        <a href="{{ '/lead-magnet/' | relative_url }}">Free Checklist</a>
        <a href="{{ '/contact/' | relative_url }}">Book</a>
      </nav>
    </header>

    <main class="post-shell">
      <article class="post-article">
        <div class="post-meta">
          <p class="eyebrow">SQE Blog</p>
          <h1>{{ page.title }}</h1>
          <p>{{ page.date | date: "%B %-d, %Y" }}</p>
        </div>
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <p>{{ site.title }}</p>
      <p>Replace placeholders with your real name, email, and booking link before publishing.</p>
    </footer>
  </body>
</html>
